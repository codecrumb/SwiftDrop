name = "swiftdrop"
workers_dev = true
compatibility_date = "2024-11-24"
main = "worker.js"
preview_urls = true

# Durable Object for WebSocket signaling
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "SignalingRoom"

# R2 bucket for fallback file storage
[[r2_buckets]]
binding = "FILE_STORAGE"
bucket_name = "swiftdrop"

# Durable Object migrations
[[migrations]]
tag = "v2"
new_sqlite_classes = ["SignalingRoom"]

# Scheduled cleanup (runs every 5 minutes)
[triggers]
crons = ["*/5 * * * *"]

# Observability settings
[observability]
[observability.logs]
enabled = false
head_sampling_rate = 1
invocation_logs = true
persist = true