name = "swiftdrop"
account_id = "your-account-id"
workers_dev = true
compatibility_date = "2024-11-24"
main = "worker.js"

[[r2_buckets]]
binding = "FILE_BUCKET"
bucket_name = "swiftdrop"

[[durable_objects.bindings]]
name = "SSE_CONNECTIONS"
class_name = "SSEConnectionManager"

[[migrations]]
tag = "v1"
new_classes = ["SSEConnectionManager"]

[observability]
[observability.logs]
enabled = false
head_sampling_rate = 1
invocation_logs = true
persist = true
